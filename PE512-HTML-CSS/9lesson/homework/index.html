<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tailwind</title>
</head>
<body>
    <div class="flex flex-wrap gap-6 bg-gray-100 p-10">

  <!-- Product Card -->
  <div class="w-[340px] bg-white border border-gray-200 rounded-2xl p-5">
    <h2 class="text-lg font-bold text-gray-900 mb-2">Product Card</h2>

    <p class="text-sm text-gray-500 mb-4">
      Краткое описание товара, его преимущества и особенности.
    </p>

    <div class="flex gap-2 mb-4">
      <span class="text-xs px-2.5 py-1 rounded-full bg-gray-100 text-gray-700">New</span>
      <span class="text-xs px-2.5 py-1 rounded-full bg-gray-100 text-gray-700">Sale</span>
      <span class="text-xs px-2.5 py-1 rounded-full bg-gray-100 text-gray-700">Top</span>
    </div>

    <div class="flex justify-between items-center">
      <p class="text-xl font-extrabold text-gray-900">$99</p>
      <button class="px-3.5 py-2 rounded-[10px] bg-gray-900 text-white text-sm font-semibold">
        Buy now
      </button>
    </div>
  </div>

  <!-- Profile Card -->
  <div class="w-[340px] bg-white border border-gray-200 rounded-2xl p-5">
    <div class="flex items-center gap-3 mb-3">
      <div class="w-12 h-12 rounded-xl bg-gray-900"></div>

      <div>
        <h2 class="text-base font-bold text-gray-900">Alex Morgan</h2>
        <p class="text-[13px] text-gray-500">Frontend Developer</p>
      </div>
    </div>

    <p class="text-sm text-gray-700 mb-4">
      Создаёт современные интерфейсы и адаптивные сайты.
    </p>

    <div class="flex gap-2.5">
      <div class="px-2.5 py-2 rounded-[10px] border border-gray-200 text-xs text-gray-700">
        120 Posts
      </div>
      <div class="px-2.5 py-2 rounded-[10px] border border-gray-200 text-xs text-gray-700">
        8 Projects
      </div>
    </div>
  </div>

  <!-- Article Card -->
  <div class="w-[340px] border border-gray-200 rounded-2xl bg-white overflow-hidden">
    <div class="h-[140px] bg-gray-300 border-b border-gray-200"></div>

    <div class="p-4">
      <p class="text-xs text-blue-600 font-bold mb-1.5">DESIGN</p>

      <h2 class="text-lg font-bold text-gray-900 mb-2">
        Article Card
      </h2>

      <p class="text-sm text-gray-500">
        Небольшое описание статьи или новости в несколько строк.
      </p>
    </div>
  </div>

</div>
<script src="https://cdn.tailwindcss.com"></script>
</body>
</html>

<!-- 1. Tailwind vs Bootstrap
Tailwind — утилиты, Bootstrap — готовые компоненты

2. Utility классы
Классы для одного свойства (p-4, text-sm)

3. Дизайн система
Набор правил и компонентов интерфейса

4. SCSS
Расширенный CSS для удобства разработки

5. Когда Tailwind
Когда нужен быстрый и гибкий UI без написания CSS -->
