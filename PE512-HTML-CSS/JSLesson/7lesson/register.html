<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    
    <div class="container">
        <div class="navigation">
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
        </div>

        <form id="registerForm">
            <input type="text" id="regName" placeholder="Name">
            <p class="error-text" id="regNameError"></p>

            <input type="text" id="regEmail" placeholder="Email">
            <p class="error-text" id="regEmailError"></p>

            <input type="text" id="regNumber" placeholder="Phone">
            <p class="error-text" id="regNumberError"></p>

            <input type="password" id="regPassword" placeholder="Password">
            <p class="error-text" id="regPasswordError"></p>

            <label for="">
                <input type="checkbox" id="showRegPassword"> Show Password
            </label>

            <button type="submit" class="btn">Register</button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
